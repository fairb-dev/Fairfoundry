  <rect x="0" y="0" width="1100" height="560" fill="#ffffff"/>
<text x="550.0" y="36" class="title" text-anchor="middle">Fairfoundry — System Architecture</text>
<rect x="60" y="80" width="240" height="90" class="box"/>
<text x="180" y="110" class="lbl" text-anchor="middle">OEM</text>
