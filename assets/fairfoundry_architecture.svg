<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420">
  <rect x="20" y="30" width="260" height="90" rx="10" ry="10" fill="#f5f5f5" stroke="#333"/>
  <text x="150" y="65" font-size="18" text-anchor="middle" font-family="Arial">OEM</text>
  <text x="150" y="90" font-size="12" text-anchor="middle" font-family="Arial">(Buyer wallet)</text>

  <rect x="370" y="30" width="260" height="90" rx="10" ry="10" fill="#f5f5f5" stroke="#333"/>
  <text x="500" y="65" font-size="18" text-anchor="middle" font-family="Arial">FACTORY</text>
  <text x="500" y="90" font-size="12" text-anchor="middle" font-family="Arial">(Manufacturer)</text>

  <rect x="720" y="30" width="260" height="90" rx="10" ry="10" fill="#f5f5f5" stroke="#333"/>
  <text x="850" y="65" font-size="18" text-anchor="middle" font-family="Arial">QA</text>
  <text x="850" y="90" font-size="12" text-anchor="middle" font-family="Arial">(Independent org)</text>

  <rect x="150" y="170" width="700" height="200" rx="14" ry="14" fill="#eef7ff" stroke="#333"/>
  <text x="500" y="200" font-size="20" text-anchor="middle" font-family="Arial">Fairfoundry — Soroban Contract on Stellar</text>
  <text x="500" y="225" font-size="12" text-anchor="middle" font-family="Arial">• Escrow & payouts  • QA stake/slash  • ERS & pricing w/ timelock</text>
  <text x="500" y="245" font-size="12" text-anchor="middle" font-family="Arial">• Disputes (2-of-3)  • Events for analytics  • Optional Oracle</text>

  <!-- arrows down -->
  <line x1="150" y1="120" x2="300" y2="170" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="500" y1="120" x2="500" y2="170" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="850" y1="120" x2="700" y2="170" stroke="#333" marker-end="url(#arrow)"/>

  <!-- oracle + SAC -->
  <rect x="70" y="360" width="220" height="40" rx="8" ry="8" fill="#fff" stroke="#333"/>
  <text x="180" y="385" font-size="12" text-anchor="middle" font-family="Arial">Asset Client (SAC): XLM / USDC</text>

  <rect x="710" y="360" width="220" height="40" rx="8" ry="8" fill="#fff" stroke="#333"/>
  <text x="820" y="385" font-size="12" text-anchor="middle" font-family="Arial">Optional Oracle: price feed</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#333" />
    </marker>
  </defs>
</svg>
