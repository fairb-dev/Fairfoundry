<path d="M 550 170 L 550 220 L 550 220" fill="none" stroke="#333" marker-end="url(#arrow)"/>
<path d="M 920 170 L 920 220 L 800 220" fill="none" stroke="#333" marker-end="url(#arrow)"/>
