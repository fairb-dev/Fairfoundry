<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="580">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#333" />
    </marker>
    <style>
      .box { fill: #f9fbfd; stroke: #333; rx: 10; ry: 10; }
      .sub { fill: #eef7ff; }
      .title { font-family: Arial; font-size: 20px; font-weight: bold; }
      .lbl { font-family: Arial; font-size: 13px; }
      .small { font-family: Arial; font-size: 11px; }
      .mono { font-family: 'Courier New', monospace; font-size: 12px; }
    </style>
  </defs>

  <text x="550" y="40" class="title" text-anchor="middle">Fairfoundry — System Architecture (Updated)</text>

  <!-- Parties -->
  <rect x="40" y="80" width="260" height="90" class="box"/>
  <text x="170" y="110" class="lbl" text-anchor="middle">OEM</text>
  <text x="170" y="135" class="small" text-anchor="middle">Funds escrow, can dispute & request reinspection</text>

  <rect x="420" y="80" width="260" height="90" class="box"/>
  <text x="550" y="110" class="lbl" text-anchor="middle">FACTORY</text>
  <text x="550" y="135" class="small" text-anchor="middle">Creates lots, receives payouts</text>

  <rect x="800" y="80" width="260" height="90" class="box"/>
  <text x="930" y="110" class="lbl" text-anchor="middle">QA Provider (Fairbuild)</text>
  <text x="930" y="135" class="small" text-anchor="middle">Posts QA results/serials/attestation; staked</text>

  <!-- Contract Box -->
  <rect x="130" y="220" width="840" height="240" class="box sub"/>
  <text x="550" y="250" class="lbl" text-anchor="middle">Fairfoundry (Soroban on Stellar)</text>
  <text x="550" y="272" class="small" text-anchor="middle">• Escrow & payouts • ERS/pricing timelocks • Disputes 2-of-3 • Pause</text>
  <text x="550" y="292" class="small" text-anchor="middle">• QA stake/slash • Serials Merkle root • Testbench attestation</text>
  <text x="550" y="312" class="small" text-anchor="middle">• Reinspection sampling (deterministic) • Events for analytics</text>

  <!-- Lines to contract -->
  <line x1="170" y1="170" x2="300" y2="220" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="550" y1="170" x2="550" y2="220" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="930" y1="170" x2="800" y2="220" stroke="#333" marker-end="url(#arrow)"/>

  <!-- Inside contract subcomponents -->
  <rect x="160" y="330" width="210" height="110" class="box"/>
  <text x="265" y="355" class="lbl" text-anchor="middle">Escrow & Payouts</text>
  <text x="265" y="375" class="small" text-anchor="middle">price/tiers • penalties • partials</text>

  <rect x="390" y="330" width="210" height="110" class="box"/>
  <text x="495" y="355" class="lbl" text-anchor="middle">QA Commitments</text>
  <text x="495" y="375" class="small" text-anchor="middle">results root • serials root • attestation</text>

  <rect x="620" y="330" width="210" height="110" class="box"/>
  <text x="725" y="355" class="lbl" text-anchor="middle">Reinspection</text>
  <text x="725" y="375" class="small" text-anchor="middle">seed → deterministic sample → deadline</text>

  <rect x="850" y="330" width="110" height="110" class="box"/>
  <text x="905" y="355" class="lbl" text-anchor="middle">Govern</text>
  <text x="905" y="375" class="small" text-anchor="middle">2-of-3 + timelock</text>

  <!-- SAC / Oracle -->
  <rect x="60" y="490" width="300" height="60" class="box"/>
  <text x="210" y="515" class="lbl" text-anchor="middle">Asset Client (SAC): XLM / USDC</text>

  <rect x="740" y="490" width="300" height="60" class="box"/>
  <text x="890" y="515" class="lbl" text-anchor="middle">Optional Oracle (price/FX)</text>

</svg>