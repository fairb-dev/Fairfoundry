<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Fairbuild shared manufacturing control record</title>
  <desc id="desc">A buyer-facing diagram showing how source files, quality gates, factory evidence, customer review, and final outcomes become one shared control record.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f6f9fc"/>
    </linearGradient>
    <linearGradient id="accent" x1="180" y1="0" x2="1260" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#533afd"/>
      <stop offset="0.7" stop-color="#7b89ff"/>
      <stop offset="1" stop-color="#15be53"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#32325d" flood-opacity=".14"/>
      <feDropShadow dx="0" dy="8" stdDeviation="11" flood-color="#061b31" flood-opacity=".08"/>
    </filter>
    <style>
      .bg{fill:url(#bg)}
      .shell{fill:#fff;stroke:#d8e4f0;stroke-width:1.4;rx:10;filter:url(#shadow)}
      .panel{fill:#fbfdff;stroke:#d8e4f0;stroke-width:1.3;rx:8}
      .dark{fill:#121a43;rx:10}
      .title{font-family:Inter,Arial,sans-serif;font-size:48px;font-weight:400;fill:#061b31}
      .subtitle{font-family:Inter,Arial,sans-serif;font-size:19px;font-weight:400;fill:#4f6179}
      .kicker{font-family:Inter,Arial,sans-serif;font-size:12px;font-weight:600;fill:#533afd}
      .label{font-family:Inter,Arial,sans-serif;font-size:20px;font-weight:600;fill:#061b31}
      .copy{font-family:Inter,Arial,sans-serif;font-size:14px;font-weight:400;fill:#62728a}
      .copyDark{font-family:Inter,Arial,sans-serif;font-size:14px;font-weight:400;fill:#dbe4fb}
      .labelDark{font-family:Inter,Arial,sans-serif;font-size:20px;font-weight:600;fill:#fff}
      .mono{font-family:Source Code Pro,Consolas,monospace;font-size:12px;font-weight:600;fill:#533afd}
      .monoMuted{font-family:Source Code Pro,Consolas,monospace;font-size:12px;font-weight:500;fill:#7a8799}
      .line{fill:none;stroke:url(#accent);stroke-width:5;stroke-linecap:round}
      .thin{fill:none;stroke:#cfddec;stroke-width:1.5}
      .chip{fill:#eef0ff;stroke:#b9b9f9;stroke-width:1;rx:6}
      .chipGreen{fill:#e7f9f1;stroke:#9bd8ce;stroke-width:1;rx:6}
    </style>
  </defs>
  <rect class="bg" width="1440" height="900"/>
  <text x="120" y="108" class="kicker">FAIRBUILD CONTRACT OPERATIONS</text>
  <text x="120" y="164" class="title">From source file to control record</text>
  <text x="120" y="202" class="subtitle">Every milestone carries its source, gates, evidence, review rights, and final outcome in one shared record.</text>

  <rect x="105" y="252" width="1230" height="448" class="shell"/>
  <rect x="105" y="252" width="1230" height="62" class="dark"/>
  <text x="138" y="291" class="labelDark">Contract workspace: WLO PVT lot A17</text>
  <text x="1112" y="291" class="copyDark">model review</text>

  <rect x="138" y="356" width="278" height="254" class="panel"/>
  <text x="168" y="394" class="kicker">SOURCE PACKAGE</text>
  <text x="168" y="431" class="label">wlo_pvt_limits.json</text>
  <text x="168" y="462" class="copy">CSV, JSON, ERP, PLM, MES, QA export,</text>
  <text x="168" y="486" class="copy">or supplier attachment.</text>
  <line x1="168" y1="510" x2="386" y2="510" class="thin"/>
  <text x="168" y="546" class="mono">124 parameters</text>
  <text x="168" y="576" class="monoMuted">4 gate groups, 3 quality grades</text>

  <path class="line" d="M455 483H1032"/>
  <path d="M1032 483l-22-13v26z" fill="#15be53"/>

  <g>
    <rect x="456" y="378" width="116" height="150" class="panel"/>
    <text x="481" y="413" class="mono">01</text>
    <text x="481" y="451" class="label">Extract</text>
    <text x="481" y="480" class="copy">Draft fields</text>
    <text x="481" y="502" class="copy">and limits.</text>
  </g>
  <g>
    <rect x="604" y="378" width="116" height="150" class="panel"/>
    <text x="629" y="413" class="mono">02</text>
    <text x="629" y="451" class="label">Gate</text>
    <text x="629" y="480" class="copy">Approve</text>
    <text x="629" y="502" class="copy">rules.</text>
  </g>
  <g>
    <rect x="752" y="378" width="116" height="150" class="panel"/>
    <text x="777" y="413" class="mono">03</text>
    <text x="777" y="451" class="label">Grade</text>
    <text x="777" y="480" class="copy">Define</text>
    <text x="777" y="502" class="copy">outcomes.</text>
  </g>
  <g>
    <rect x="900" y="378" width="116" height="150" class="panel"/>
    <text x="925" y="413" class="mono">04</text>
    <text x="925" y="451" class="label">Verify</text>
    <text x="925" y="480" class="copy">Check factory</text>
    <text x="925" y="502" class="copy">evidence.</text>
  </g>

  <rect x="1064" y="356" width="232" height="254" class="panel"/>
  <text x="1094" y="394" class="kicker">CONTROL RECORD</text>
  <rect x="1094" y="422" width="172" height="38" class="chipGreen"/>
  <text x="1115" y="446" class="mono">48-hour review</text>
  <text x="1094" y="493" class="copy">Default path finalizes unless</text>
  <text x="1094" y="517" class="copy">the customer initiates review.</text>
  <rect x="1094" y="542" width="154" height="38" class="chip"/>
  <text x="1115" y="566" class="mono">arbitration path</text>
  <text x="1094" y="614" class="copy">Review can route to Fairbuild</text>
  <text x="1094" y="638" class="copy">arbitration or reinspection.</text>

  <rect x="138" y="640" width="1158" height="34" rx="6" fill="#eef0ff" stroke="#b9b9f9"/>
  <text x="168" y="662" class="mono">CONTROL CHAIN</text>
  <text x="332" y="662" class="monoMuted">source -> model -> gates -> evidence -> review -> outcome</text>
</svg>
