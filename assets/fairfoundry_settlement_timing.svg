<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="310" viewBox="0 0 1100 310">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#333" />
    </marker>
    <style>
      .box-prod  { fill:#f9fbfd; stroke:#334155; stroke-width:1.2; rx:8; ry:8; }
      .box-qa    { fill:#fef9c3; stroke:#a16207; stroke-width:1.2; rx:8; ry:8; }
      .box-wait  { fill:#fef2f2; stroke:#dc2626; stroke-width:1; rx:8; ry:8; stroke-dasharray:4,2; }
      .box-pay   { fill:#f0fdf4; stroke:#16a34a; stroke-width:1.2; rx:8; ry:8; }
      .title     { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill:#0f172a; }
      .subtitle  { font-family: Arial, sans-serif; font-size: 12px; fill:#64748b; }
      .lbl       { font-family: Arial, sans-serif; font-size: 12px; fill:#0f172a; }
      .note      { font-family: Arial, sans-serif; font-size: 10px; fill:#64748b; }
    </style>
  </defs>

  <rect x="0" y="0" width="1100" height="310" fill="#ffffff"/>

  <!-- Title -->
  <text x="550" y="28" class="title" text-anchor="middle">Settlement Timing — Pipelined Micro-Lots</text>
  <text x="550" y="46" class="subtitle" text-anchor="middle">Lots overlap in production; each must pass QA + dispute window before settlement</text>

  <!-- Timeline -->
  <line x1="50" y1="70" x2="1040" y2="70" stroke="#334155" stroke-width="1.5"/>
  <text x="1050" y="75" class="note">time</text>
  <path d="M 1040 70 L 1050 70" fill="none" stroke="#333" marker-end="url(#arrow)"/>

  <!-- Lot #1 -->
  <rect x="60" y="95" width="130" height="28" class="box-prod"/>
  <text x="125" y="114" class="lbl" text-anchor="middle">Lot#1 create</text>

  <rect x="195" y="95" width="110" height="28" class="box-qa"/>
  <text x="250" y="114" class="lbl" text-anchor="middle">QA commit+test</text>

  <rect x="310" y="95" width="90" height="28" class="box-wait"/>
  <text x="355" y="114" class="note" text-anchor="middle">dispute window</text>

  <rect x="405" y="95" width="100" height="28" class="box-pay"/>
  <text x="455" y="114" class="lbl" text-anchor="middle">$ settle</text>

  <!-- Lot #2 -->
  <rect x="210" y="140" width="130" height="28" class="box-prod"/>
  <text x="275" y="159" class="lbl" text-anchor="middle">Lot#2 create</text>

  <rect x="345" y="140" width="110" height="28" class="box-qa"/>
  <text x="400" y="159" class="lbl" text-anchor="middle">QA commit+test</text>

  <rect x="460" y="140" width="90" height="28" class="box-wait"/>
  <text x="505" y="159" class="note" text-anchor="middle">dispute window</text>

  <rect x="555" y="140" width="100" height="28" class="box-pay"/>
  <text x="605" y="159" class="lbl" text-anchor="middle">$ settle</text>

  <!-- Lot #3 -->
  <rect x="360" y="185" width="130" height="28" class="box-prod"/>
  <text x="425" y="204" class="lbl" text-anchor="middle">Lot#3 create</text>

  <rect x="495" y="185" width="110" height="28" class="box-qa"/>
  <text x="550" y="204" class="lbl" text-anchor="middle">QA commit+test</text>

  <rect x="610" y="185" width="90" height="28" class="box-wait"/>
  <text x="655" y="204" class="note" text-anchor="middle">dispute window</text>

  <rect x="705" y="185" width="100" height="28" class="box-pay"/>
  <text x="755" y="204" class="lbl" text-anchor="middle">$ settle</text>

  <!-- Legend -->
  <rect x="60" y="250" width="14" height="10" class="box-prod" style="stroke-width:1"/>
  <text x="80" y="259" class="note">create_lot()</text>

  <rect x="180" y="250" width="14" height="10" class="box-qa" style="stroke-width:1"/>
  <text x="200" y="259" class="note">qa_commit() + qa_update_counts()</text>

  <rect x="400" y="250" width="14" height="10" class="box-wait" style="stroke-width:1"/>
  <text x="420" y="259" class="note">dispute_window_secs (min 1800s)</text>

  <rect x="620" y="250" width="14" height="10" class="box-pay" style="stroke-width:1"/>
  <text x="640" y="259" class="note">execute_payment()</text>

  <text x="60" y="285" class="note">Reinspection challenges can be filed during QA or dispute window, blocking settlement until resolved.</text>
</svg>
