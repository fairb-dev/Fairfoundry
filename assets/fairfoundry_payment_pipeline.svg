<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="320" viewBox="0 0 1100 320">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#333" />
    </marker>
  </defs>
  <rect x="0" y="0" width="1100" height="320" fill="#ffffff"/>
<text x="550" y="36" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle" fill="#000">Payment Pipeline</text>
<rect x="80" y="90" width="190" height="70" rx="10" ry="10" fill="#f9fbfd" stroke="#333"/>
<text x="175" y="120" font-family="Arial" font-size="16" font-weight="normal" text-anchor="middle" fill="#000">Passed Units</text>
<text x="175" y="140" font-family="Arial" font-size="12" font-weight="normal" text-anchor="middle" fill="#000">from QA counts</text>
<rect x="320" y="90" width="220" height="70" rx="10" ry="10" fill="#f9fbfd" stroke="#333"/>
<text x="430" y="120" font-family="Arial" font-size="16" font-weight="normal" text-anchor="middle" fill="#000">Base Payment</text>
<text x="430" y="140" font-family="Arial" font-size="12" font-weight="normal" text-anchor="middle" fill="#000">passed × price_per_unit</text>
<rect x="600" y="90" width="220" height="70" rx="10" ry="10" fill="#f9fbfd" stroke="#333"/>
<text x="710" y="120" font-family="Arial" font-size="16" font-weight="normal" text-anchor="middle" fill="#000">Volume Discount</text>
<text x="710" y="140" font-family="Arial" font-size="12" font-weight="normal" text-anchor="middle" fill="#000">tiers → discount_bps</text>
<rect x="880" y="90" width="190" height="70" rx="10" ry="10" fill="#f9fbfd" stroke="#333"/>
<text x="975" y="120" font-family="Arial" font-size="16" font-weight="normal" text-anchor="middle" fill="#000">Defect Penalty</text>
<text x="975" y="140" font-family="Arial" font-size="12" font-weight="normal" text-anchor="middle" fill="#000">if defect_bps &amp;gt; ERS</text>
<line x1="270" y1="125" x2="320" y2="125" stroke="#333" marker-end="url(#arrow)"/>
<line x1="540" y1="125" x2="600" y2="125" stroke="#333" marker-end="url(#arrow)"/>
<line x1="820" y1="125" x2="880" y2="125" stroke="#333" marker-end="url(#arrow)"/>
<rect x="200" y="210" width="240" height="70" rx="10" ry="10" fill="#f9fbfd" stroke="#333"/>
<text x="320" y="240" font-family="Arial" font-size="16" font-weight="normal" text-anchor="middle" fill="#000">Partial Payouts</text>
<text x="320" y="260" font-family="Arial" font-size="12" font-weight="normal" text-anchor="middle" fill="#000">cap: entitlement - partials</text>
<rect x="560" y="210" width="240" height="70" rx="10" ry="10" fill="#f9fbfd" stroke="#333"/>
<text x="680" y="240" font-family="Arial" font-size="16" font-weight="normal" text-anchor="middle" fill="#000">Final Settlement</text>
<text x="680" y="260" font-family="Arial" font-size="12" font-weight="normal" text-anchor="middle" fill="#000">idempotent</text>
<line x1="430" y1="160" x2="320" y2="210" stroke="#333" marker-end="url(#arrow)"/>
<line x1="790" y1="160" x2="560" y2="210" stroke="#333" marker-end="url(#arrow)"/>
</svg>