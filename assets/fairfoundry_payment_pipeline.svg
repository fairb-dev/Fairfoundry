<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="320">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#333" />
    </marker>
    <style>
      .box { fill: #f9fbfd; stroke: #333; rx: 10; ry: 10; }
      .sub { fill: #eef7ff; }
      .title { font-family: Arial; font-size: 20px; font-weight: bold; }
      .lbl { font-family: Arial; font-size: 13px; }
      .small { font-family: Arial; font-size: 11px; }
      .mono { font-family: 'Courier New', monospace; font-size: 12px; }
    </style>
  </defs>

  <text x="550" y="40" class="title" text-anchor="middle">Payment Pipeline</text>

  <rect x="80" y="90" width="190" height="70" class="box"/>
  <text x="175" y="120" class="lbl" text-anchor="middle">Passed Units</text>
  <text x="175" y="140" class="small" text-anchor="middle">from QA counts</text>

  <rect x="320" y="90" width="220" height="70" class="box"/>
  <text x="430" y="120" class="lbl" text-anchor="middle">Base Payment</text>
  <text x="430" y="140" class="small" text-anchor="middle">passed * price_per_unit</text>

  <rect x="600" y="90" width="220" height="70" class="box"/>
  <text x="710" y="120" class="lbl" text-anchor="middle">Volume Discount</text>
  <text x="710" y="140" class="small" text-anchor="middle">tiers → discount_bps</text>

  <rect x="880" y="90" width="190" height="70" class="box"/>
  <text x="975" y="120" class="lbl" text-anchor="middle">Defect Penalty</text>
  <text x="975" y="140" class="small" text-anchor="middle">if defect_bps &gt; ERS</text>

  <line x1="270" y1="125" x2="320" y2="125" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="540" y1="125" x2="600" y2="125" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="820" y1="125" x2="880" y2="125" stroke="#333" marker-end="url(#arrow)"/>

  <rect x="200" y="210" width="240" height="70" class="box"/>
  <text x="320" y="240" class="lbl" text-anchor="middle">Partial Payouts</text>
  <text x="320" y="260" class="small" text-anchor="middle">cap: entitled - prior partials</text>

  <rect x="560" y="210" width="240" height="70" class="box"/>
  <text x="680" y="240" class="lbl" text-anchor="middle">Final Settlement</text>
  <text x="680" y="260" class="small" text-anchor="middle">idempotent (pays remaining)</text>

  <line x1="430" y1="160" x2="320" y2="210" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="790" y1="160" x2="560" y2="210" stroke="#333" marker-end="url(#arrow)"/>

</svg>