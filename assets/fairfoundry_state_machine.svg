<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="660" viewBox="0 0 1100 660">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#333" />
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#dc2626" />
    </marker>
    <style>
      .box       { fill:#f9fbfd; stroke:#334155; stroke-width:1.5; rx:12; ry:12; }
      .box-end   { fill:#e2e8f0; stroke:#334155; stroke-width:1.5; rx:12; ry:12; }
      .box-rsv   { fill:#fef9c3; stroke:#a16207; stroke-width:1; rx:12; ry:12; stroke-dasharray:5,3; }
      .title     { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill:#0f172a; }
      .subtitle  { font-family: Arial, sans-serif; font-size: 12px; fill:#64748b; }
      .lbl       { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill:#0f172a; }
      .desc      { font-family: Arial, sans-serif; font-size: 11px; fill:#475569; }
      .edge      { font-family: Arial, sans-serif; font-size: 11px; fill:#334155; }
      .edge-note { font-family: Arial, sans-serif; font-size: 10px; fill:#2563eb; }
      .legend    { font-family: Arial, sans-serif; font-size: 11px; fill:#475569; }
      .start     { fill:#334155; }
    </style>
  </defs>

  <rect x="0" y="0" width="1100" height="660" fill="#ffffff"/>

  <!-- Title -->
  <text x="550" y="32" class="title" text-anchor="middle">Lot Lifecycle — State Machine</text>
  <text x="550" y="50" class="subtitle" text-anchor="middle">LotStatus enum transitions (from contracts/fairfoundry/src/lib.rs)</text>

  <!-- ═══ MAIN FLOW ═══ -->

  <!-- Start node -->
  <circle cx="70" cy="155" r="10" class="start"/>
  <path d="M 80 155 L 130 155" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="105" y="145" class="edge" text-anchor="middle">create_lot()</text>

  <!-- Open -->
  <rect x="135" y="128" width="160" height="55" class="box"/>
  <text x="215" y="153" class="lbl" text-anchor="middle">Open</text>
  <text x="215" y="170" class="desc" text-anchor="middle">Awaiting QA commit</text>

  <!-- Open → InQA -->
  <path d="M 295 155 L 395 155" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="345" y="145" class="edge" text-anchor="middle">qa_commit()</text>
  <text x="345" y="133" class="edge" text-anchor="middle">qa_commit_full()</text>

  <!-- InQA -->
  <rect x="400" y="128" width="160" height="55" class="box"/>
  <text x="480" y="153" class="lbl" text-anchor="middle">InQA</text>
  <text x="480" y="170" class="desc" text-anchor="middle">Testing in progress</text>

  <!-- Self-loop on InQA for partial updates -->
  <path d="M 475 128 C 475 85, 545 85, 545 128" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="520" y="95" class="desc" text-anchor="middle">qa_update_counts()</text>
  <text x="520" y="108" class="desc" text-anchor="middle">tested &lt; quantity</text>

  <!-- InQA → Approved -->
  <path d="M 560 155 L 660 155" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="610" y="133" class="edge" text-anchor="middle">qa_update_counts()</text>
  <text x="610" y="147" class="edge" text-anchor="middle">tested == quantity</text>

  <!-- Approved -->
  <rect x="665" y="128" width="170" height="55" class="box"/>
  <text x="750" y="153" class="lbl" text-anchor="middle">Approved</text>
  <text x="750" y="170" class="desc" text-anchor="middle">Ready for settlement</text>

  <!-- Approved → Paid -->
  <path d="M 835 145 L 920 145" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="878" y="137" class="edge" text-anchor="middle">execute_payment()</text>
  <text x="878" y="125" class="edge-note" text-anchor="middle">payment &gt; 0</text>

  <!-- Paid (terminal) -->
  <rect x="925" y="120" width="145" height="55" class="box-end"/>
  <text x="998" y="145" class="lbl" text-anchor="middle">Paid</text>
  <text x="998" y="162" class="desc" text-anchor="middle">Settlement complete</text>

  <!-- Approved → Closed (penalty path) -->
  <path d="M 750 183 L 750 260 L 998 260 L 998 248" fill="none" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="870" y="253" class="edge" text-anchor="middle">execute_payment()</text>
  <text x="870" y="275" class="edge-note" text-anchor="middle">payment &lt;= 0 (penalties exceed value)</text>

  <!-- Closed (terminal) -->
  <rect x="925" y="210" width="145" height="55" class="box-end"/>
  <text x="998" y="235" class="lbl" text-anchor="middle">Closed</text>
  <text x="998" y="252" class="desc" text-anchor="middle">Zero payout</text>

  <!-- ═══ Reserved States ═══ -->
  <text x="100" y="330" class="subtitle">Reserved for future use (not yet wired in contract logic):</text>

  <!-- Disputed (reserved) -->
  <rect x="100" y="345" width="180" height="50" class="box-rsv"/>
  <text x="190" y="368" class="lbl" text-anchor="middle">Disputed</text>
  <text x="190" y="383" class="desc" text-anchor="middle">Future: dispute resolution</text>

  <!-- Refunded (reserved) -->
  <rect x="330" y="345" width="180" height="50" class="box-rsv"/>
  <text x="420" y="368" class="lbl" text-anchor="middle">Refunded</text>
  <text x="420" y="383" class="desc" text-anchor="middle">Future: lot refund</text>

  <!-- ═══ Challenge Mechanism (parallel, not a state) ═══ -->
  <rect x="80" y="430" width="960" height="170" rx="12" ry="12" fill="#f0f9ff" stroke="#93c5fd" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="560" y="455" class="lbl" text-anchor="middle">Reinspection Challenge (runs in parallel — not a LotStatus)</text>
  <text x="560" y="472" class="subtitle" text-anchor="middle">Any party can challenge after QA commits. Does not change LotStatus.</text>

  <!-- Challenge flow boxes -->
  <rect x="110" y="490" width="170" height="50" class="box"/>
  <text x="195" y="513" class="desc" text-anchor="middle">request_reinspect()</text>
  <text x="195" y="528" class="desc" text-anchor="middle">ChallengeStatus::Open</text>

  <path d="M 280 515 L 340 515" fill="none" stroke="#2563eb" stroke-width="1.2" marker-end="url(#arrow-blue)"/>

  <rect x="345" y="490" width="190" height="50" class="box"/>
  <text x="440" y="508" class="desc" text-anchor="middle">qa_reinspect_respond()</text>
  <text x="440" y="523" class="desc" text-anchor="middle">→ Responded (fee refunded)</text>
  <text x="440" y="535" class="desc" text-anchor="middle">→ stake unlocked</text>

  <text x="575" y="515" class="desc" text-anchor="middle">OR</text>

  <rect x="610" y="490" width="200" height="50" class="box"/>
  <text x="710" y="508" class="desc" text-anchor="middle">Deadline passes, then:</text>
  <text x="710" y="523" class="desc" text-anchor="middle">challenge_default_slash()</text>
  <text x="710" y="535" class="desc" text-anchor="middle">→ Expired (stake slashed 50/50)</text>

  <rect x="855" y="490" width="160" height="50" class="box"/>
  <text x="935" y="513" class="desc" text-anchor="middle">Open challenge blocks</text>
  <text x="935" y="528" class="desc" text-anchor="middle">execute_payment()</text>

  <!-- Legend -->
  <rect x="80" y="635" width="16" height="10" class="box" style="stroke-width:1;"/>
  <text x="102" y="644" class="legend">Active state</text>
  <rect x="200" y="635" width="16" height="10" class="box-end" style="stroke-width:1;"/>
  <text x="222" y="644" class="legend">Terminal state</text>
  <rect x="340" y="635" width="16" height="10" class="box-rsv" style="stroke-width:1;"/>
  <text x="362" y="644" class="legend">Reserved (future)</text>
  <line x1="490" y1="640" x2="530" y2="640" stroke="#dc2626" stroke-width="1.5"/>
  <text x="538" y="644" class="legend">Penalty path</text>
</svg>
