<text x="510" y="115" font-family="Arial" font-size="16" font-weight="normal" text-anchor="middle" fill="#000">Approved</text>
<rect x="640" y="80" width="140" height="60" rx="10" ry="10" fill="#f9fbfd" stroke="#333"/>
<text x="710" y="115" font-family="Arial" font-size="16" font-weight="normal" text-anchor="middle" fill="#000">Paid</text>
<rect x="810" y="80" width="220" height="60" rx="10" ry="10" fill="#f9fbfd" stroke="#333"/>
