<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">Fairfoundry public state machine</title>
  <desc id="desc">Public state machine showing lot creation, QA, review, reinspection, and finalization.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#334155"/></marker>
    <style>
      .box{fill:#f9fbfd;stroke:#334155;stroke-width:1.5;rx:12}
      .end{fill:#e2e8f0;stroke:#334155;stroke-width:1.5;rx:12}
      .review{fill:#f0f7ff;stroke:#93c5fd;stroke-width:1.3;rx:12}
      .title{font-family:Arial,sans-serif;font-size:20px;font-weight:700;fill:#0f172a}
      .subtitle{font-family:Arial,sans-serif;font-size:12px;fill:#64748b}
      .lbl{font-family:Arial,sans-serif;font-size:14px;font-weight:700;fill:#0f172a}
      .desc{font-family:Arial,sans-serif;font-size:11px;fill:#475569}
      .edge{font-family:Arial,sans-serif;font-size:11px;fill:#334155}
    </style>
  </defs>
  <rect width="1100" height="560" fill="#fff"/>
  <text x="550" y="32" class="title" text-anchor="middle">Lot Lifecycle - Public Control View</text>
  <text x="550" y="50" class="subtitle" text-anchor="middle">How a lot moves from source agreement to accepted record or review</text>

  <circle cx="75" cy="175" r="10" fill="#334155"/>
  <path d="M85 175H135" stroke="#334155" fill="none" marker-end="url(#arrow)"/>
  <text x="110" y="162" class="edge" text-anchor="middle">create lot</text>

  <rect x="140" y="145" width="150" height="60" class="box"/>
  <text x="215" y="171" class="lbl" text-anchor="middle">Open</text>
  <text x="215" y="190" class="desc" text-anchor="middle">Awaiting QA evidence</text>

  <path d="M290 175H400" stroke="#334155" fill="none" marker-end="url(#arrow)"/>
  <text x="345" y="162" class="edge" text-anchor="middle">commit evidence</text>

  <rect x="405" y="145" width="150" height="60" class="box"/>
  <text x="480" y="171" class="lbl" text-anchor="middle">In QA</text>
  <text x="480" y="190" class="desc" text-anchor="middle">Tests in progress</text>

  <path d="M555 175H665" stroke="#334155" fill="none" marker-end="url(#arrow)"/>
  <text x="610" y="162" class="edge" text-anchor="middle">counts complete</text>

  <rect x="670" y="145" width="160" height="60" class="box"/>
  <text x="750" y="171" class="lbl" text-anchor="middle">Accepted</text>
  <text x="750" y="190" class="desc" text-anchor="middle">Gates satisfied</text>

  <path d="M830 175H930" stroke="#334155" fill="none" marker-end="url(#arrow)"/>
  <text x="880" y="162" class="edge" text-anchor="middle">review window</text>

  <rect x="935" y="145" width="140" height="60" class="end"/>
  <text x="1005" y="171" class="lbl" text-anchor="middle">Finalized</text>
  <text x="1005" y="190" class="desc" text-anchor="middle">Record closed</text>

  <path d="M750 205V285" stroke="#334155" fill="none" marker-end="url(#arrow)"/>
  <text x="798" y="245" class="edge">customer initiates review</text>

  <rect x="615" y="290" width="270" height="70" class="review"/>
  <text x="750" y="318" class="lbl" text-anchor="middle">Review Protocol</text>
  <text x="750" y="338" class="desc" text-anchor="middle">Fairbuild arbitration or reinspection path</text>

  <path d="M615 325H475" stroke="#334155" fill="none" marker-end="url(#arrow)"/>
  <rect x="300" y="295" width="170" height="60" class="box"/>
  <text x="385" y="321" class="lbl" text-anchor="middle">Reinspect</text>
  <text x="385" y="340" class="desc" text-anchor="middle">Sample and respond</text>

  <path d="M470 325H615" stroke="#334155" fill="none" marker-end="url(#arrow)"/>
  <path d="M885 325H1005V205" stroke="#334155" fill="none" marker-end="url(#arrow)"/>
  <text x="953" y="315" class="edge" text-anchor="middle">resolved outcome</text>

  <rect x="80" y="430" width="940" height="56" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="550" y="455" class="subtitle" text-anchor="middle">The public view describes control states only. private outcome rules are configured outside this documentation.</text>
  <text x="550" y="474" class="subtitle" text-anchor="middle">Source code contains lower-level enum names for compatibility with existing tests.</text>
</svg>
