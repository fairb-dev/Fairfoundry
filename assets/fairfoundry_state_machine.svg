<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="460">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#333" />
    </marker>
    <style>
      .box { fill: #f9fbfd; stroke: #333; rx: 10; ry: 10; }
      .sub { fill: #eef7ff; }
      .title { font-family: Arial; font-size: 20px; font-weight: bold; }
      .lbl { font-family: Arial; font-size: 13px; }
      .small { font-family: Arial; font-size: 11px; }
      .mono { font-family: 'Courier New', monospace; font-size: 12px; }
    </style>
  </defs>

  <text x="550" y="40" class="title" text-anchor="middle">Lot Lifecycle with Reinspection & Disputes</text>

  <rect x="40" y="80" width="140" height="60" class="box"/><text x="110" y="115" class="lbl" text-anchor="middle">Open</text>
  <rect x="220" y="80" width="160" height="60" class="box"/><text x="300" y="115" class="lbl" text-anchor="middle">InQA</text>
  <rect x="420" y="80" width="180" height="60" class="box"/><text x="510" y="115" class="lbl" text-anchor="middle">Approved</text>
  <rect x="640" y="80" width="140" height="60" class="box"/><text x="710" y="115" class="lbl" text-anchor="middle">Paid</text>
  <rect x="810" y="80" width="220" height="60" class="box"/><text x="920" y="115" class="lbl" text-anchor="middle">Refunded / Closed</text>

  <line x1="180" y1="110" x2="220" y2="110" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="380" y1="110" x2="420" y2="110" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="600" y1="110" x2="640" y2="110" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="780" y1="110" x2="810" y2="110" stroke="#333" marker-end="url(#arrow)"/>

  <!-- Reinspection branch from InQA/Approved -->
  <rect x="420" y="200" width="210" height="60" class="box"/><text x="525" y="235" class="lbl" text-anchor="middle">Reinspection Challenge</text>
  <line x1="300" y1="140" x2="435" y2="200" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="510" y1="140" x2="525" y2="200" stroke="#333" marker-end="url(#arrow)"/>
  <text x="525" y="265" class="small" text-anchor="middle">sample indices + deadline</text>

  <rect x="700" y="200" width="180" height="60" class="box"/><text x="790" y="235" class="lbl" text-anchor="middle">Response / Slash</text>
  <line x1="630" y1="230" x2="700" y2="230" stroke="#333" marker-end="url(#arrow)"/>
  <text x="790" y="265" class="small" text-anchor="middle">QA responds → continue; no response → slash</text>

  <!-- Dispute branch -->
  <rect x="420" y="320" width="160" height="60" class="box"/><text x="500" y="355" class="lbl" text-anchor="middle">Disputed</text>
  <line x1="510" y1="140" x2="500" y2="320" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="580" y1="350" x2="710" y2="110" stroke="#333" marker-end="url(#arrow)"/>
  <text x="630" y="330" class="small">2-of-3 resolve</text>

</svg>