  <rect x="0" y="0" width="1100" height="420" fill="#ffffff"/>
<text x="550" y="36" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle" fill="#000">Lot Lifecycle with Reinspection &amp; Disputes</text>
<rect x="40" y="80" width="140" height="60" rx="10" ry="10" fill="#f9fbfd" stroke="#333"/>
<text x="110" y="115" font-family="Arial" font-size="16" font-weight="normal" text-anchor="middle" fill="#000">Open</text>
