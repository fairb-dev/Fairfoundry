<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#333" />
    </marker>
    <style>
      .box { fill:#f9fbfd; stroke:#333; rx:10; ry:10; }
      .sub { fill:#eef7ff; }
      .title { font-family: Arial; font-size: 20px; font-weight: bold; }
      .lbl { font-family: Arial; font-size: 14px; }
      .small { font-family: Arial; font-size: 12px; }
    </style>
  </defs>
  <rect x="0" y="0" width="1100" height="520" fill="#ffffff"/>
<text x="550.0" y="36" class="title" text-anchor="middle">Lot Lifecycle (Clean)</text>
<rect x="120" y="120" width="160" height="60" class="box"/>
<text x="200.0" y="155.0" class="lbl" text-anchor="middle">Open</text>
<rect x="340" y="120" width="180" height="60" class="box"/>
<text x="430.0" y="155.0" class="lbl" text-anchor="middle">InQA</text>
<rect x="580" y="120" width="200" height="60" class="box"/>
<text x="680.0" y="155.0" class="lbl" text-anchor="middle">Approved</text>
<rect x="840" y="120" width="160" height="60" class="box"/>
<text x="920.0" y="155.0" class="lbl" text-anchor="middle">Paid</text>
<rect x="840" y="260" width="200" height="60" class="box"/>
<text x="940.0" y="295.0" class="lbl" text-anchor="middle">Refunded / Closed</text>
<rect x="580" y="260" width="180" height="60" class="box"/>
<text x="670.0" y="295.0" class="lbl" text-anchor="middle">Disputed</text>
<rect x="580" y="400" width="220" height="60" class="box"/>
<text x="690.0" y="435.0" class="lbl" text-anchor="middle">Reinspect</text>
<path d="M 280 150.0 L 340 150.0 L 340 150.0" fill="none" stroke="#333" marker-end="url(#arrow)"/>
<path d="M 520 150.0 L 580 150.0 L 580 150.0" fill="none" stroke="#333" marker-end="url(#arrow)"/>
<path d="M 780 150.0 L 840 150.0 L 840 150.0" fill="none" stroke="#333" marker-end="url(#arrow)"/>
<path d="M 680.0 180 L 680.0 260 L 670.0 260" fill="none" stroke="#333" marker-end="url(#arrow)"/>
<text x="680.0" y="210.0" class="small" text-anchor="middle">dispute_open()</text>
<path d="M 670.0 260 L 670.0 180 L 840 180 L 840 150.0" fill="none" stroke="#333" marker-end="url(#arrow)"/>
<text x="755.0" y="170" class="small" text-anchor="middle">dispute_resolve(pay_factory=true)</text>
<path d="M 760 290.0 L 840 290.0 L 840 290.0" fill="none" stroke="#333" marker-end="url(#arrow)"/>
<text x="800.0" y="280.0" class="small" text-anchor="middle">dispute_resolve(pay_factory=false)</text>
<path d="M 430.0 180 L 430.0 400 L 690.0 400" fill="none" stroke="#333" marker-end="url(#arrow)"/>
<path d="M 680.0 180 L 680.0 400 L 690.0 400" fill="none" stroke="#333" marker-end="url(#arrow)"/>
<text x="690" y="390" class="small" text-anchor="middle">request_reinspect() / respond or slash</text>
<text x="430.0" y="110" class="small" text-anchor="middle">qa_update_counts()</text>
<text x="680.0" y="110" class="small" text-anchor="middle">tested == quantity → Approved</text>
<text x="920.0" y="110" class="small" text-anchor="middle">execute_payment()</text>
</svg>