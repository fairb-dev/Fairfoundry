<line x1="380" y1="110" x2="420" y2="110" stroke="#333" marker-end="url(#arrow)"/>
<line x1="600" y1="110" x2="640" y2="110" stroke="#333" marker-end="url(#arrow)"/>
<line x1="780" y1="110" x2="810" y2="110" stroke="#333" marker-end="url(#arrow)"/>
<rect x="420" y="200" width="210" height="60" rx="10" ry="10" fill="#f9fbfd" stroke="#333"/>
<text x="525" y="235" font-family="Arial" font-size="14" font-weight="normal" text-anchor="middle" fill="#000">Reinspection Challenge</text>
<line x1="300" y1="140" x2="435" y2="200" stroke="#333" marker-end="url(#arrow)"/>
<line x1="510" y1="140" x2="525" y2="200" stroke="#333" marker-end="url(#arrow)"/>
