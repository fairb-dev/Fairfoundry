<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="320">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#333" />
    </marker>
  </defs>
  <!-- states -->
  <rect x="40" y="40" width="140" height="60" rx="10" fill="#f5f5f5" stroke="#333"/><text x="110" y="75" text-anchor="middle" font-family="Arial">Open</text>
  <rect x="260" y="40" width="140" height="60" rx="10" fill="#f5f5f5" stroke="#333"/><text x="330" y="75" text-anchor="middle" font-family="Arial">InQA</text>
  <rect x="480" y="40" width="160" height="60" rx="10" fill="#f5f5f5" stroke="#333"/><text x="560" y="75" text-anchor="middle" font-family="Arial">Approved</text>
  <rect x="700" y="40" width="160" height="60" rx="10" fill="#f5f5f5" stroke="#333"/><text x="780" y="75" text-anchor="middle" font-family="Arial">Paid</text>
  <rect x="880" y="40" width="180" height="60" rx="10" fill="#f5f5f5" stroke="#333"/><text x="970" y="75" text-anchor="middle" font-family="Arial">Refunded/Closed</text>

  <!-- arrows -->
  <line x1="180" y1="70" x2="260" y2="70" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="400" y1="70" x2="480" y2="70" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="640" y1="70" x2="700" y2="70" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="860" y1="70" x2="880" y2="70" stroke="#333" marker-end="url(#arrow)"/>

  <!-- dispute branch -->
  <rect x="520" y="160" width="140" height="60" rx="10" fill="#f5f5f5" stroke="#333"/><text x="590" y="195" text-anchor="middle" font-family="Arial">Disputed</text>
  <line x1="560" y1="100" x2="590" y2="160" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="590" y1="220" x2="780" y2="220" stroke="#333" marker-end="url(#arrow)"/>
  <text x="685" y="240" text-anchor="middle" font-family="Arial" font-size="12">2-of-3 resolve</text>
  <line x1="590" y1="220" x2="970" y2="220" stroke="#333" marker-end="url(#arrow)"/>
</svg>
