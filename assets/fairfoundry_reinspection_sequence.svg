<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700" role="img" aria-labelledby="title desc">
  <title id="title">Reinspection challenge sequence</title>
  <desc id="desc">Sequence for customer review, deterministic sampling, QA response, and final outcome recording.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#334155"/></marker>
    <marker id="blue" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#2563eb"/></marker>
    <style>
      .title{font-family:Arial,sans-serif;font-size:20px;font-weight:700;fill:#0f172a}
      .subtitle{font-family:Arial,sans-serif;font-size:12px;fill:#64748b}
      .actor{font-family:Arial,sans-serif;font-size:14px;font-weight:700;fill:#0f172a}
      .msg{font-family:Arial,sans-serif;font-size:12px;fill:#334155}
      .note{font-family:Arial,sans-serif;font-size:11px;fill:#475569}
      .sep{font-family:Arial,sans-serif;font-size:13px;font-weight:700;fill:#64748b}
    </style>
  </defs>
  <rect width="1100" height="700" fill="#fff"/>
  <text x="550" y="30" class="title" text-anchor="middle">Reinspection Challenge - Sequence</text>
  <text x="550" y="48" class="subtitle" text-anchor="middle">Customer review can route accepted work into arbitration or sample-based reinspection</text>

  <rect x="80" y="70" width="160" height="34" rx="6" fill="#f1f5f9" stroke="#334155"/>
  <text x="160" y="92" class="actor" text-anchor="middle">Requester</text>
  <rect x="470" y="70" width="160" height="34" rx="6" fill="#f1f5f9" stroke="#334155"/>
  <text x="550" y="92" class="actor" text-anchor="middle">Fairfoundry</text>
  <rect x="860" y="70" width="160" height="34" rx="6" fill="#f1f5f9" stroke="#334155"/>
  <text x="940" y="92" class="actor" text-anchor="middle">QA Provider</text>

  <line x1="160" y1="112" x2="160" y2="670" stroke="#cbd5e1" stroke-dasharray="4,3"/>
  <line x1="550" y1="112" x2="550" y2="670" stroke="#cbd5e1" stroke-dasharray="4,3"/>
  <line x1="940" y1="112" x2="940" y2="670" stroke="#cbd5e1" stroke-dasharray="4,3"/>

  <rect x="40" y="130" width="1020" height="24" fill="#f8fafc"/>
  <text x="550" y="147" class="sep" text-anchor="middle">REQUEST PHASE</text>
  <text x="350" y="185" class="msg" text-anchor="middle">request_reinspect(sample_size, deadline, seed)</text>
  <line x1="160" y1="190" x2="545" y2="190" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="470" y="210" width="160" height="36" rx="4" fill="#fefce8" stroke="#a16207"/>
  <text x="550" y="233" class="note" text-anchor="middle">check rate limit</text>
  <rect x="470" y="260" width="160" height="52" rx="4" fill="#fefce8" stroke="#a16207"/>
  <text x="550" y="282" class="note" text-anchor="middle">create deterministic</text>
  <text x="550" y="298" class="note" text-anchor="middle">sample indices</text>
  <text x="350" y="340" class="msg" text-anchor="middle">return sample_indices[] and due_by</text>
  <line x1="545" y1="345" x2="165" y2="345" stroke="#2563eb" stroke-width="1.5" marker-end="url(#blue)"/>

  <rect x="40" y="390" width="1020" height="24" fill="#f0fdf4"/>
  <text x="550" y="407" class="sep" text-anchor="middle">RESPONSE PATH</text>
  <text x="750" y="445" class="msg" text-anchor="middle">qa_reinspect_respond(pass, fail, proof_hash)</text>
  <line x1="935" y1="450" x2="555" y2="450" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="470" y="470" width="160" height="48" rx="4" fill="#fefce8" stroke="#a16207"/>
  <text x="550" y="491" class="note" text-anchor="middle">validate sample</text>
  <text x="550" y="506" class="note" text-anchor="middle">and proof hash</text>
  <text x="550" y="545" class="note" text-anchor="middle">status -> Responded, record outcome</text>

  <rect x="40" y="585" width="1020" height="24" fill="#fef2f2"/>
  <text x="550" y="602" class="sep" text-anchor="middle">MISSED DEADLINE PATH</text>
  <text x="350" y="635" class="msg" text-anchor="middle">deadline passes, then final outcome can be recorded</text>
  <line x1="160" y1="640" x2="545" y2="640" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="550" y="676" class="note" text-anchor="middle">Public diagram excludes private outcome rules.</text>
</svg>
