<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="320" viewBox="0 0 1100 320" role="img" aria-labelledby="title desc">
  <title id="title">Governance timelock</title>
  <desc id="desc">Governance flow for proposing, approving, waiting, and executing ERS, role, review policy, or upgrade changes.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#334155"/></marker>
    <style>
      .box{fill:#f9fbfd;stroke:#334155;stroke-width:1.4;rx:10}
      .title{font-family:Arial,sans-serif;font-size:20px;font-weight:700;fill:#0f172a}
      .subtitle{font-family:Arial,sans-serif;font-size:12px;fill:#64748b}
      .lbl{font-family:Arial,sans-serif;font-size:15px;font-weight:700;fill:#0f172a}
      .desc{font-family:Arial,sans-serif;font-size:12px;fill:#475569}
      .note{font-family:Arial,sans-serif;font-size:11px;fill:#64748b}
      .mono{font-family:Courier New,monospace;font-size:11px;fill:#334155}
    </style>
  </defs>
  <rect width="1100" height="320" fill="#fff"/>
  <text x="550" y="32" class="title" text-anchor="middle">Governance: Multisig + Timelock</text>
  <text x="550" y="50" class="subtitle" text-anchor="middle">Public governance flow for parameter and contract updates</text>

  <rect x="50" y="80" width="210" height="95" class="box"/>
  <text x="155" y="105" class="lbl" text-anchor="middle">1. Propose</text>
  <text x="155" y="124" class="desc" text-anchor="middle">Any party submits update</text>
  <line x1="70" y1="140" x2="240" y2="140" stroke="#e2e8f0"/>
  <text x="155" y="158" class="note" text-anchor="middle">proposer auto-approved</text>

  <path d="M260 127H300" stroke="#334155" fill="none" marker-end="url(#arrow)"/>
  <rect x="305" y="80" width="220" height="95" class="box"/>
  <text x="415" y="105" class="lbl" text-anchor="middle">2. Approve</text>
  <text x="415" y="124" class="desc" text-anchor="middle">Requires quorum</text>
  <line x1="325" y1="140" x2="505" y2="140" stroke="#e2e8f0"/>
  <text x="415" y="158" class="note" text-anchor="middle">OEM + Factory + QA</text>

  <path d="M525 127H565" stroke="#334155" fill="none" marker-end="url(#arrow)"/>
  <rect x="570" y="80" width="220" height="95" class="box"/>
  <text x="680" y="105" class="lbl" text-anchor="middle">3. Wait</text>
  <text x="680" y="124" class="desc" text-anchor="middle">Timelock must pass</text>
  <line x1="590" y1="140" x2="770" y2="140" stroke="#e2e8f0"/>
  <text x="680" y="158" class="mono" text-anchor="middle">eta = now + delay</text>

  <path d="M790 127H830" stroke="#334155" fill="none" marker-end="url(#arrow)"/>
  <rect x="835" y="80" width="210" height="95" class="box"/>
  <text x="940" y="105" class="lbl" text-anchor="middle">4. Execute</text>
  <text x="940" y="124" class="desc" text-anchor="middle">Apply update, emit event</text>
  <line x1="855" y1="140" x2="1025" y2="140" stroke="#e2e8f0"/>
  <text x="940" y="158" class="note" text-anchor="middle">guarded by eta and execution state</text>

  <rect x="50" y="212" width="995" height="78" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="80" y="238" class="lbl">Proposable public updates:</text>
  <text x="80" y="264" class="desc">ERS thresholds</text>
  <text x="310" y="264" class="desc">role policy</text>
  <text x="535" y="264" class="desc">review protocol settings</text>
  <text x="820" y="264" class="desc">contract upgrade hash</text>
</svg>
